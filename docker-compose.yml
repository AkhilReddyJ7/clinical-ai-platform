services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - uploads_data:/app/data/uploads

    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-clinical_ai}
      STORAGE_ROOT: /app/data/uploads

    depends_on:
      postgres:
        condition: service_healthy

    command: >
      uv run uvicorn apps.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinical_ai}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
