services:
  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile

    # A dedicated one-shot service, not a step inside api's or worker's own
    # command: both of those start concurrently once postgres is healthy,
    # and each running its own `alembic upgrade head` races the other on
    # a *fresh* database -- both see no `alembic_version` table yet and
    # both try to create it, and Postgres correctly rejects one of the two
    # concurrent CREATE TABLEs with a unique-violation, crashing whichever
    # container loses the race. Confirmed directly: this only reproduces
    # against a genuinely empty postgres_data volume (exactly what CI
    # always has), never against a volume that already has schema applied
    # from a prior run -- which is why local testing against a reused
    # volume didn't catch it. Running the migration exactly once, before
    # either long-running process starts, removes the race entirely
    # without making api and worker depend on each other.
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-clinical_ai}

    depends_on:
      postgres:
        condition: service_healthy

    command: uv run alembic upgrade head
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - uploads_data:/app/data/uploads

    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-clinical_ai}
      STORAGE_ROOT: /app/data/uploads
      API_KEYS: ${API_KEYS:-local-dev:local-dev-key}

    depends_on:
      migrate:
        condition: service_completed_successfully

    command: uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile

    # Same image as api (no separate Dockerfile needed -- this process
    # needs exactly the same dependencies: uv, tesseract, the app code),
    # just a different command and no exposed port. Shares the same
    # uploads_data volume as api: apps/worker/main.py's worker reads
    # documents from the same on-disk storage api's /documents endpoint
    # wrote them to (modules/processing/worker.py's own _storage()
    # factory, built from the same Settings.storage_root).
    volumes:
      - .:/app
      - uploads_data:/app/data/uploads

    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-clinical_ai}
      STORAGE_ROOT: /app/data/uploads
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

    depends_on:
      migrate:
        condition: service_completed_successfully

    # Depends on the same one-shot `migrate` service api does, not on api
    # itself -- keeps api and worker independent of each other, matching
    # how this would scale to multiple worker replicas with no api
    # dependency chain between them.
    command: uv run python -m apps.worker.main

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinical_ai}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
