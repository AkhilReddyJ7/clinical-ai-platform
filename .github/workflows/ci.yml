name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy)
        run: uv run mypy apps modules shared tests alembic scripts

      - name: Test (pytest)
        run: uv run pytest -v

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start stack and wait for healthy
        run: docker compose up --wait --wait-timeout 90

      - name: Smoke test /health
        run: curl -sf http://localhost:8000/health | grep -q '"status":"healthy"'

      - name: Verify api container runs as non-root
        run: |
          user=$(docker compose exec -T api whoami)
          echo "api container user: $user"
          [ "$user" != "root" ]

      - name: Smoke test upload + process against the real stack
        run: |
          # No ANTHROPIC_API_KEY is provisioned in CI (see docs/adr/0019):
          # this deliberately does not make a live LLM call on every CI run.
          # AnthropicFieldExtractionPipeline fails closed per-request when
          # no key is configured (FieldExtractionError), so the expected
          # outcome here is a clean "failed" status via the same graceful
          # failure path as any other extraction failure (docs/adr/0012) —
          # this still proves the full container/dependency wiring (OCR,
          # PHI gate, field-extraction stage, and now the worker service)
          # works end-to-end, without needing real credentials or
          # incurring per-run API cost.
          #
          # ADR-0022: POST /process only enqueues now (202, no result
          # body) -- the `worker` service (docker-compose.yml) claims and
          # runs the job asynchronously, so this polls GET /result until
          # the document reaches a terminal status instead of reading the
          # process response directly.
          echo "synthetic ci smoke test note" > /tmp/ci-smoke.txt
          doc=$(curl -sf -H "X-API-Key: local-dev-key" \
            -F "file=@/tmp/ci-smoke.txt;type=text/plain" \
            http://localhost:8000/documents)
          echo "upload response: $doc"
          doc_id=$(echo "$doc" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          process_response=$(curl -sf -H "X-API-Key: local-dev-key" -X POST \
            "http://localhost:8000/documents/$doc_id/process")
          echo "process response: $process_response"
          echo "$process_response" | grep -q '"job_status":"queued"'

          result=""
          for _ in $(seq 1 30); do
            result=$(curl -sf -H "X-API-Key: local-dev-key" "http://localhost:8000/documents/$doc_id/result")
            status=$(echo "$result" | python3 -c "import sys,json; print(json.load(sys.stdin)['document']['status'])")
            [ "$status" = "failed" ] && break
            sleep 1
          done
          echo "final result response: $result"
          echo "$result" | grep -q '"status":"failed"'
          echo "$result" | grep -q 'Anthropic API key is not configured'

      - name: Verify real Tesseract OCR works in the built image
        run: |
          # Runs a real image through the real TesseractExtractionPipeline
          # inside the built container. Deliberately not asserting exact
          # OCR text — tiny bitmap-font renders are legitimately noisy
          # (confirmed while building this) — only that OCR functions at
          # all and produces meaningful, non-trivial confidence. This is
          # what would actually catch "tesseract missing/broken in the
          # image" without flaking on OCR accuracy variance.
          docker compose exec -T api python3 -c "
          from modules.ocr.tesseract import TesseractExtractionPipeline
          from PIL import Image, ImageDraw, ImageFont
          import io

          img = Image.new('RGB', (600, 100), color='white')
          draw = ImageDraw.Draw(img)
          draw.text((10, 40), 'automated continuous integration OCR check', fill='black', font=ImageFont.load_default())
          buf = io.BytesIO()
          img.save(buf, format='PNG')

          output = TesseractExtractionPipeline().extract(data=buf.getvalue(), content_type='image/png')
          print('raw_text:', repr(output.raw_text))
          print('confidence:', output.confidence)
          assert output.raw_text.strip(), 'tesseract produced no text at all'
          assert output.confidence > 0.3, f'suspiciously low confidence: {output.confidence}'
          "

      - name: Verify real fastembed + Chroma retrieval works in the built image
        run: |
          # Real ONNX embedding (model baked into the image at build time,
          # ADR-0034) and a real Chroma round-trip (ADR-0033) inside the
          # api container, using CHROMA_HOST/CHROMA_PORT exactly as the
          # app itself is configured -- proves the new service and
          # dependency wiring actually work, at near-zero cost since no
          # model download happens at request time.
          docker compose exec -T api python3 -c "
          import uuid
          from modules.retrieval.fastembed_embeddings import FastEmbedEmbeddingPipeline
          from modules.retrieval.chroma_store import ChromaVectorStore

          embedder = FastEmbedEmbeddingPipeline(
              model_name='BAAI/bge-small-en-v1.5', cache_dir='/opt/fastembed_cache'
          )
          store = ChromaVectorStore(host='chroma', port=8000, collection_name='ci_smoke_test')

          text = 'ci smoke test chunk about diabetes management'
          vector = embedder.embed([text])[0]
          assert len(vector) == 384, f'unexpected embedding dimensionality: {len(vector)}'

          chunk_id = str(uuid.uuid4())
          store.upsert(
              ids=[chunk_id],
              embeddings=[vector],
              documents=[text],
              metadatas=[{'document_id': 'ci-doc', 'extraction_id': 'ci-ext', 'chunk_index': 0}],
          )
          results = store.query(query_embedding=vector, top_k=1)
          print('query results:', results)
          assert len(results) == 1, 'expected exactly one round-tripped result'
          assert results[0].chunk_text == text
          "

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
