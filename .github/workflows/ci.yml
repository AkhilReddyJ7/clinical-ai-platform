name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy)
        run: uv run mypy apps modules shared tests alembic

      - name: Test (pytest)
        run: uv run pytest -v

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start stack and wait for healthy
        run: docker compose up --wait --wait-timeout 90

      - name: Smoke test /health
        run: curl -sf http://localhost:8000/health | grep -q '"status":"healthy"'

      - name: Verify api container runs as non-root
        run: |
          user=$(docker compose exec -T api whoami)
          echo "api container user: $user"
          [ "$user" != "root" ]

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
